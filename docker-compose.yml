services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_PASSWORD: kb
      POSTGRES_DB: kb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kb"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - kb_pgdata:/var/lib/postgresql/data

  # Optional key-free local LLM + embeddings.
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - kb_ollama:/root/.ollama

  kbd:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HTTP_ADDR: ":8080"
      PG_URL: "postgres://postgres:kb@postgres:5432/kb?sslmode=disable"
      LLM_PROVIDER: "ollama"
      LLM_MODEL: "llama3.1"
      EMBEDDING_PROVIDER: "ollama"
      EMBEDDING_MODEL: "nomic-embed-text"
      EMBEDDING_DIM: "768"
      OLLAMA_HOST: "http://ollama:11434"
      JWT_SECRET: "dev-insecure-secret-change-me"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://localhost:4318"
    ports:
      - "8080:8080"

volumes:
  kb_pgdata:
  kb_ollama:
